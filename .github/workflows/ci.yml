name: CI - Build, Push, Update Manifests

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:latest

      - name: Update backend image tag in manifest
        run: |
          sed -i "s|${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:.*|${{ secrets.ACR_LOGIN_SERVER }}/voting-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml

      - name: Update frontend image tag in manifest
        run: |
          sed -i "s|${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:.*|${{ secrets.ACR_LOGIN_SERVER }}/voting-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
